# Prefix: ctrl+a (replaces ghostty's ctrl+` leader)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Core
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g mouse on
set -g history-limit 100000
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -s escape-time 0
set -g focus-events on
set -gq allow-passthrough on
set -g visual-activity off

# Start Index at 1
set -g base-index 1
setw -g pane-base-index 1

# Vi keys in copy mode
set -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Navigate panes — vim-tmux-navigator aware
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\\' 'select-pane -l'

# Create splits — prefix + h/j/k/l (mirrors old ctrl+`>h/j/k/l)
# stays in current directory
bind h split-window -h -b -c "#{pane_current_path}"
bind l split-window -h -c "#{pane_current_path}"
bind k split-window -v -b -c "#{pane_current_path}"
bind j split-window -v -c "#{pane_current_path}"

# Zoom / close / windows (mirrors old ctrl+`>f/q/n/p)
bind f resize-pane -Z
bind q kill-pane
bind n next-window
bind p previous-window
bind c new-window -c "#{pane_current_path}"

# Resize panes — prefix + arrow
bind -r Left  resize-pane -L 5
bind -r Right resize-pane -R 5
bind -r Up    resize-pane -U 5
bind -r Down  resize-pane -D 5

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Auto-save every 15 min, auto-restore on tmux start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @resurrect-capture-pane-contents 'on'

# TPM — keep this line last
run '~/.tmux/plugins/tpm/tpm'

# Session management
bind S command-prompt -p "new session:" "new-session -s '%%'"
bind K confirm-before -p "kill session #S? (y/n)" kill-session

# Status bar — dark_pastel colors
set -g status-position bottom 
set -g status-interval 5
set -g status-style "bg=#000000,fg=#E0E0E0"

set -g status-left-length 40
set -g status-left "#[bg=#B3C7FF,fg=#000000,bold] #S #[bg=#000000,fg=#B3C7FF]"

set -g status-right-length 60
set -g status-right "#[fg=#666666]%H:%M  %d %b"

set -g window-status-format " #[fg=#666666]#I #W "
set -g window-status-current-format "#[bg=#262626,fg=#E0E0E0,bold] #I #W "

set -g pane-border-style "fg=#1A1A1A"
set -g pane-active-border-style "fg=#B3C7FF"

set -g message-style "bg=#1A1A1A,fg=#E0E0E0"
