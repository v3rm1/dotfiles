set -g prefix C-b
bind C-b send-prefix

# Ensure Homebrew binaries (tmux itself) are available in run-shell scripts
set-environment -g PATH "/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"

# Core
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g mouse on
set -g history-limit 100000
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'
set -s escape-time 0
set -g focus-events on
set -gq allow-passthrough on
set -g visual-activity off

# Start Index at 1
set -g base-index 1
setw -g pane-base-index 1

# Vi keys in copy mode
set -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Navigate panes — prefix + wasd
bind w select-pane -U
bind a select-pane -L
bind s select-pane -D
bind d select-pane -R

# Create splits — prefix + h/j/k/l (mirrors old ctrl+`>h/j/k/l)
# stays in current directory
bind h split-window -h -b -c "#{pane_current_path}"
bind l split-window -h -c "#{pane_current_path}"
bind k split-window -v -b -c "#{pane_current_path}"
bind j split-window -v -c "#{pane_current_path}"

# Zoom / close / windows (mirrors old ctrl+`>f/q/n/p)
bind f resize-pane -Z
bind q kill-pane
bind n next-window
bind p previous-window
bind c new-window -c "#{pane_current_path}"

# Resize panes — prefix + arrow
bind -r Left  resize-pane -L 5
bind -r Right resize-pane -R 5
bind -r Up    resize-pane -U 5
bind -r Down  resize-pane -D 5

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'janoamaral/tokyo-night-tmux'

# Auto-save every 15 min, auto-restore on tmux start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @resurrect-capture-pane-contents 'on'

# Tokyo Night Storm
set -g @tokyo-night-tmux_theme storm
set -g @tokyo-night-tmux_show_datetime 1
set -g @tokyo-night-tmux_date_format DMY
set -g @tokyo-night-tmux_time_format 24H
set -g @tokyo-night-tmux_show_git 0
set -g @tokyo-night-tmux_window_id_style none
set -g @tokyo-night-tmux_pane_id_style hide
set -g @tokyo-night-tmux_zoom_id_style hide

# Session management
bind S command-prompt -p "new session:" "new-session -s '%%'"
bind K confirm-before -p "kill session #S? (y/n)" kill-session

# TPM — keep this line last
run '~/.tmux/plugins/tpm/tpm'
