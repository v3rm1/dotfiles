format = """
$claude_model\
$claude_cost\
$claude_context\
$os\
$directory\
$git_branch\
$git_status\
$git_metrics\
$container\
$kubernetes\
$terraform\
$python\
$golang\
$nodejs\
$rust\
$lua\
$sudo\
$jobs\
$battery\
$cmd_duration\
$status\
$fill\
$shlvl\
$memory_usage\
$custom\
$line_break\
$character"""

palette = "tokyonight_storm"

[character]
success_symbol = "[](bold green)"
error_symbol = "[](bold red)"
vimcmd_symbol = "[](bold blue)"

[aws]
symbol = "  "

[buf]
symbol = " "

[bun]
symbol = " "

[c]
symbol = " "

[cpp]
symbol = " "

[cmake]
symbol = " "

[conda]
symbol = " "

[crystal]
symbol = " "

[dart]
symbol = " "

[deno]
symbol = " "

[directory]
read_only = " 󰌾"

[docker_context]
symbol = " "

[elixir]
symbol = " "

[elm]
symbol = " "

[fennel]
symbol = " "

[fossil_branch]
symbol = " "

[gcloud]
symbol = "  "

[git_branch]
symbol = " "

[git_commit]
tag_symbol = '  '

[golang]
symbol = " "

[guix_shell]
symbol = " "

[haskell]
symbol = " "

[haxe]
symbol = " "

[hg_branch]
symbol = " "

[hostname]
ssh_symbol = " "

[java]
symbol = " "

[julia]
symbol = " "

[kotlin]
symbol = " "

[lua]
symbol = " "

[meson]
symbol = "󰔷 "

[nim]
symbol = "󰆥 "

[nix_shell]
symbol = " "

[nodejs]
symbol = " "

[ocaml]
symbol = " "

[os.symbols]
Alpaquita = " "
Alpine = " "
AlmaLinux = " "
Amazon = " "
Android = " "
Arch = " "
Artix = " "
CachyOS = " "
CentOS = " "
Debian = " "
DragonFly = " "
Emscripten = " "
EndeavourOS = " "
Fedora = " "
FreeBSD = " "
Garuda = "󰛓 "
Gentoo = " "
HardenedBSD = "󰞌 "
Illumos = "󰈸 "
Kali = " "
Linux = " "
Mabox = " "
Macos = " "
Manjaro = " "
Mariner = " "
MidnightBSD = " "
Mint = " "
NetBSD = " "
NixOS = " "
Nobara = " "
OpenBSD = "󰈺 "
openSUSE = " "
OracleLinux = "󰌷 "
Pop = " "
Raspbian = " "
Redhat = " "
RedHatEnterprise = " "
RockyLinux = " "
Redox = "󰀘 "
Solus = "󰠳 "
SUSE = " "
Ubuntu = " "
Unknown = " "
Void = " "
Windows = "󰍲 "

[package]
symbol = "󰏗 "

[perl]
symbol = " "

[php]
symbol = " "

[pijul_channel]
symbol = " "

[pixi]
symbol = "󰏗 "

[python]
symbol = " "

[rlang]
symbol = "󰟔 "

[ruby]
symbol = " "

[rust]
symbol = "󱘗 "

[scala]
symbol = " "

[swift]
symbol = " "

[zig]
symbol = " "

[gradle]
symbol = " "


[fill]
symbol = "·"

[git_metrics]
disabled = false

[memory_usage]
symbol = "󰍛 "
disabled = true
threshold = 90
format = "$symbol[$ram]($style) "

[cmd_duration]
min_time = 5000
format = "[$duration]($style) "

[status]
disabled = false
symbol = " "
format = "[$symbol$common_meaning$signal_name$maybe_int]($style) "

[sudo]
disabled = false
symbol = " "

[shlvl]
disabled = false
threshold = 2
symbol = "󰽜 "

[jobs]
symbol = " "

[container]
symbol = " "

[kubernetes]
disabled = false
symbol = "󱃾 "

[terraform]
symbol = "󱁢 "

[battery]
[[battery.display]]
threshold = 30
style = "bold red"
[[battery.display]]
threshold = 60
style = "bold yellow"

[time]
disabled = true

[custom.uptime]
command = "echo $(( $(date +%s) - $(sysctl -n kern.boottime | awk '{print $4}' | tr -d ,) ))"
symbol = " "
format = "[$symbol$output]($style) "
style = "dark3"
when = true

[claude_model]
symbol = "󱙺 "

[claude_cost]
symbol = "󰸦 "

[palettes.tokyonight_storm]
bg = '#24283b'
bg_dark = '#1f2335'
bg_highlight = '#292e42'
blue = '#7aa2f7'
blue0 = '#3d59a1'
blue1 = '#2ac3de'
blue2 = '#0db9d7'
blue5 = '#89ddff'
blue6 = '#b4f9f8'
blue7 = '#394b70'
cyan = '#7dcfff'
dark3 = '#545c7e'
dark5 = '#737aa2'
fg = '#c0caf5'
fg_dark = '#a9b1d6'
fg_gutter = '#3b4261'
green = '#9ece6a'
green1 = '#73daca'
green2 = '#41a6b5'
magenta = '#bb9af7'
magenta2 = '#ff007c'
orange = '#ff9e64'
purple = '#9d7cd8'
red = '#f7768e'
red1 = '#db4b4b'
teal = '#1abc9c'
yellow = '#e0af68'

# Claude statusline config
[profiles]
claude-code = "$claude_model| $directory| $git_branch| $claude_context"

